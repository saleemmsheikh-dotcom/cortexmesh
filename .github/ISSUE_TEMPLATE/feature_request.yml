name: Feature request
description: Propose a bounded CortexMesh capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Feature discussion is not implementation or governance authorization. Protected boundaries remain subject to CortexMesh review and GG-02 where applicable.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues and planning records for this request.
          required: true
        - label: I have separated the problem from my preferred implementation.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or research question
      description: What evidence-backed need cannot be met by current CortexMesh behaviour?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable acceptance criteria without prescribing unnecessary implementation detail.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Supporting evidence
      description: Link reproducible examples, replay cases, measurements, or related records.
  - type: textarea
    id: boundaries
    attributes:
      label: Architectural and governance boundaries
      description: Identify runtime, provider, Local AI, validation, research, governance, or LOCKED impact.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Proposed validation
      description: How should the request be tested without weakening independent release gates?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Include safe non-LOCKED or research-first alternatives where relevant.
